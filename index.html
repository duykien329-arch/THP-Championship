<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THP Championship</title>
    <!-- Nhúng Tailwind CSS và Font chữ Esports miễn phí -->
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(239, 68, 68, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(239, 68, 68, 0.05) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white antialiased overflow-x-hidden">

    <!-- ROOT ELEMENT CHO REACT MOCK -->
    <div id="app"></div>

    <script>
        // Bảng điểm quy đổi Free Fire chuẩn giải đấu (Bổ sung để tránh lỗi NaN)
        const PLACEMENT_POINTS = { 1: 12, 2: 9, 3: 8, 4: 7, 5: 6, 6: 5, 7: 4, 8: 3, 9: 2, 10: 1, 11: 0, 12: 0 };

        // GIẢ LẬP STATE CỦA REACT (Để bạn chạy được luôn không cần cài đặt phức tạp)
        let view = 'home'; 
        let loading = false;
        let search = '';
        let adminTeam = 'team_01';
        let adminRank = '1';
        let adminKills = '0';
        
        // Mock dữ liệu teams thay cho Firebase nếu chưa cấu hình xong
        let teams = [
            { id: 'team_01', name: 'HEAVY TEAM', flag_emoji: '🇻🇳', kill_points: 42, rank_match: 1 },
            { id: 'team_02', name: 'TEAM FLASH', flag_emoji: '🇻🇳', kill_points: 25, rank_match: 2 },
            { id: 'team_03', name: 'TALENT ESPORTS', flag_emoji: '🇻🇳', kill_points: 18, rank_match: 5 }
        ];

        // MOCK CÁC HÀM FIREBASE TRONG ẢNH CỦA BẠN (Giúp code không bị crash)
        window.FirebaseDB = {};
        window.FirebaseRef = (db, path) => path;
        window.FirebaseSet = (ref, data) => {
            console.log("Đồng bộ Firebase tại:", ref, data);
            return Promise.resolve();
        };

        // --- DÒNG 67: HÀM SẮP XẾP BẢNG XẾP HẠNG (Ảnh số 5) ---
        const getSortedLeaderboard = () => {
            return teams
                .map(t => {
                    const placementPts = PLACEMENT_POINTS[t.rank_match] || 0;
                    const totalPts = placementPts + (t.kill_points || 0);
                    return { ...t, placement_points: placementPts, total_points: totalPts };
                })
                .filter(t => t.name.toLowerCase().includes(search.toLowerCase()))
                .sort((a, b) => b.total_points - a.total_points || b.kill_points - a.kill_points);
        };

        // --- DÒNG 79: HÀM SUBMIT CỦA ADMIN (Ảnh số 4) ---
        const handleAdminSubmit = (e) => {
            e.preventDefault();
            if (!window.FirebaseDB) return;

            const targetTeamRef = window.FirebaseRef(window.FirebaseDB, `tournaments/thp_championship/teams/${adminTeam}`);

            // Cập nhật dữ liệu tạm thời trong bộ nhớ máy
            const teamIndex = teams.findIndex(t => t.id === adminTeam);
            if(teamIndex !== -1) {
                teams[teamIndex].rank_match = parseInt(adminRank);
                teams[teamIndex].kill_points = parseInt(adminKills);
            }

            window.FirebaseSet(targetTeamRef, {
                name: teams.find(t => t.id === adminTeam).name,
                flag_emoji: teams.find(t => t.id === adminTeam).flag_emoji || "🇻🇳",
                rank_match: parseInt(adminRank),
                kill_points: parseInt(adminKills)
            }).then(() => {
                alert("Cập nhật thành công lên đám mây! Hệ thống người xem đã tự động đồng bộ.");
                render(); // Reload giao diện
            });
        };

        // --- DÒNG 96: HÀM RESET TRẬN ĐẤU (Ảnh số 3) ---
        const handleResetMatch = () => {
            if (confirm("Bạn có chắc chắn muốn Reset trận đấu này trên toàn hệ thống mạng?")) {
                teams.forEach(t => {
                    const targetTeamRef = window.FirebaseRef(window.FirebaseDB, `tournaments/thp_championship/teams/${t.id}`);
                    
                    t.rank_match = 12;
                    t.kill_points = 0;

                    window.FirebaseSet(targetTeamRef, {
                        name: t.name,
                        flag_emoji: t.flag_emoji || "🇻🇳",
                        rank_match: 12,
                        kill_points: 0
                    });
                });
                render();
            }
        };

        // HÀM CHUYỂN ĐỔI VIEW NHANH
        window.setView = (newView) => {
            view = newView;
            render();
        };

        // HÀM CẬP NHẬT Ô TÌM KIẾM
        window.handleSearchChange = (e) => {
            search = e.value;
            render();
        };

        // --- ENGINE RENDER GIAO DIỆN CHÍNH (Ảnh số 1, 2, 6) ---
        const render = () => {
            const sortedData = getSortedLeaderboard();

            // Xử lý trạng thái Loading (Dòng 112)
            if (loading) {
                document.getElementById('app').innerHTML = `
                    <div class="min-h-screen w-full flex items-center justify-center bg-zinc-950 text-emerald-400 font-orbitron font-bold text-sm tracking-widest animate-pulse">
                        CONNECTING TO THP CLOUD NETWORKS...
                    </div>`;
                return;
            }

            // Giao diện chính (Dòng 120)
            let html = `
                <div class="relative min-h-screen w-full flex flex-col justify-between">
                    <!-- HEADER COMPONENT (Dòng 122) -->
                    <header class="w-full bg-zinc-950/90 backdrop-blur-md border-b border-zinc-900 sticky top-0 z-50 px-4 py-3">
                        <div class="max-w-6xl w-full mx-auto flex items-center justify-between">
                            <div class="font-orbitron font-black text-xl tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-amber-500">
                                THP CHAMPIONSHIP
                            </div>
                            <nav class="flex items-center gap-4">
                                <button onClick="setView('home')" class="pb-1 text-xs font-bold uppercase tracking-wider transition-colors ${view === 'home' ? 'text-red-500 border-b-2 border-red-500' : 'text-zinc-400 hover:text-white'}">Trang Chủ</button>
                                <button onClick="setView('leaderboard')" class="pb-1 text-xs font-bold uppercase tracking-wider transition-colors ${view === 'leaderboard' ? 'text-red-500 border-b-2 border-red-500' : 'text-zinc-400 hover:text-white'}">Leaderboard</button>
                                <button onClick="setView('admin')" class="pb-1 text-xs font-bold uppercase tracking-wider transition-colors ${view === 'admin' ? 'text-red-500 border-b-2 border-red-500' : 'text-zinc-400 hover:text-white'}">Admin</button>
                            </nav>
                        </div>
                    </header>
            `;

            // VIEW: HOME (Dòng 133)
            if (view === 'home') {
                html += `
                    <main class="flex-1 flex flex-col items-center justify-center px-4 relative py-20">
                        <div class="absolute inset-0 neon-grid pointer-events-none z-0"></div>
                        <div class="z-10 max-w-md w-full text-center">
                            <span class="px-3 py-1 rounded bg-red-600 text-white font-bold text-[10px] tracking-widest font-orbitron uppercase">
                                ESPORTS CLOUD TOURNAMENT
                            </span>
                            <h1 class="text-4xl font-black font-orbitron tracking-tight mt-3 text-white">
                                THP CHAMPIONSHIP
                            </h1>
                            <p class="mt-4 text-zinc-400 text-sm max-w-sm mx-auto">
                                Hệ thống máy chủ xử lý dữ liệu và vận hành giải đấu Free Fire thế hệ mới, đồng bộ đám mây thời gian thực.
                            </p>
                            <div class="mt-8 flex flex-col gap-3 justify-center sm:flex-row">
                                <button onClick="setView('leaderboard')" class="px-6 py-3 bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-700 hover:to-orange-700 text-white font-bold rounded-lg shadow-lg shadow-red-600/20 transition-all uppercase tracking-wider text-xs font-orbitron flex items-center justify-center gap-2">
                                    🚀 KẾT NỐI LIVE LEADERBOARD
                                </button>
                            </div>
                        </div>
                    </main>
                `;
            }

            // VIEW: LEADERBOARD (Dòng 153)
            if (view === 'leaderboard') {
                html += `
                    <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-8 z-20">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                            <div>
                                <h2 class="text-xl font-black font-orbitron text-white tracking-wider">BẢNG XẾP HẠNG</h2>
                                <p class="text-[11px] text-emerald-400 font-bold animate-pulse uppercase tracking-wide">• LIVE UPDATE</p>
                            </div>
                            <div class="relative w-full sm:w-64">
